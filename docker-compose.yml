services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthora}
      POSTGRES_USER: ${POSTGRES_USER:-healthora_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthora_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthora_user} -d ${POSTGRES_DB:-healthora}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://healthora_user:healthora_password@postgres:5432/healthora}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-healthora-dev-secret-change-in-production-XXXXXXXXXXXXX}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_MINUTES: ${LOCKOUT_MINUTES:-15}
      SYSADMIN_BOOTSTRAP_KEY: ${SYSADMIN_BOOTSTRAP_KEY:-}
      HIS_XLSX_PATH: /app/HIS (1).xlsx
      HIS_PATIENT_SEED_LIMIT: ${HIS_PATIENT_SEED_LIMIT:-300}
      ENABLE_STARTUP_SEED: ${ENABLE_STARTUP_SEED:-false}
      SEED_FAIL_OPEN: ${SEED_FAIL_OPEN:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      ALLOWED_ORIGIN_REGEX: ${ALLOWED_ORIGIN_REGEX:-https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AI_QUERY_MAX_ROWS: ${AI_QUERY_MAX_ROWS:-500}
      AI_RESPONSE_MAX_ROWS: ${AI_RESPONSE_MAX_ROWS:-200}
      AI_SQL_TIMEOUT_MS: ${AI_SQL_TIMEOUT_MS:-5000}
      AI_RAG_THRESHOLD: ${AI_RAG_THRESHOLD:-0.84}
      AI_STEINER_MIN_TERMINALS: ${AI_STEINER_MIN_TERMINALS:-3}
      AI_PLAN_CACHE_SIZE: ${AI_PLAN_CACHE_SIZE:-300}
      AI_HINT_CACHE_TTL_SECONDS: ${AI_HINT_CACHE_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
